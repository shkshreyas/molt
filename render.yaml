services:
  - type: web
    name: molt
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - key: OPENCLAW_CONFIG
        value: |
          {
            "models": {
              "mode": "merge",
              "providers": {
                "openrouter": {
                  "api": "openrouter",
                  "apiKey": "${OPENROUTER_API_KEY}",
                  "baseUrl": "https://openrouter.ai/api/v1",
                  "models": [
                    {"id": "minimax/minimax-m2.5:free", "name": "MiniMax M2.5", "contextWindow": 196608, "input": ["text"], "maxTokens": 8192, "cost": {"input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0}},
                    {"id": "nvidia/nemotron-3-super:free", "name": "NVIDIA Nemotron", "contextWindow": 262144, "input": ["text"], "maxTokens": 8192, "cost": {"input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0}},
                    {"id": "stepfun/step-3.5-flash:free", "name": "Step 3.5 Flash", "contextWindow": 262144, "input": ["text"], "maxTokens": 8192, "cost": {"input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0}}
                  ]
                },
                "google": {
                  "api": "google",
                  "apiKey": "${GOOGLE_API_KEY}",
                  "models": [
                    {"id": "gemini-2.0-flash", "name": "Gemini 2.0 Flash", "contextWindow": 1048576, "input": ["text"], "maxTokens": 8192, "cost": {"input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0}}
                  ]
                }
              }
            },
            "agents": {
              "defaults": {
                "model": {"primary": "openrouter/minimax/minimax-m2.5:free"}
              }
            },
            "channels": {
              "telegram": {
                "enabled": true,
                "dmPolicy": "allowlist",
                "allowFrom": ["*"],
                "botToken": "${TELEGRAM_BOT_TOKEN}"
              }
            }
          }
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        value: "8683984235:AAE_wMWsT2iTywqP7J8AvT4VVj_cEgqDloQ"
    disk:
      name: molt-data
      mountPath: /data
      sizeGB: 1
