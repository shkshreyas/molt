services:
  - type: web
    name: molt
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        value: "8683984235:AAE_wMWsT2iTywqP7J8AvT4VVj_cEgqDloQ"
      - key: CHANNELS_TELEGRAM_DM_POLICY
        value: "allowlist"
      - key: CHANNELS_TELEGRAM_ALLOW_FROM__SHkshreyas
        value: "*"
    disk:
      name: molt-data
      mountPath: /data
      sizeGB: 1
